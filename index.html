<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al Irsyad Al Islamiyyah Karawang</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            main: '#0F5F34', // Hijau utama
                            dark: '#0B4727', // Hijau gelap
                            yellow: '#FFC82C', // Kuning (Tombol SPMB)
                            red: '#F43F5E', // Merah (Tombol Play)
                            textDark: '#0D542E', 
                            textLight: '#8C96A3'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Mengatur agar video memenuhi area main secara responsif */
        #main-video-container video, #main-video-container iframe {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            border: none;
        }
        
        #main-video-container.playing video,
        #main-video-container.playing iframe {
            display: block;
        }

        /* Menghilangkan scrollbar pada video area jika diperlukan */
        #main-video-container {
            min-height: 300px;
            background: #000;
        }

        /* Animasi fade untuk transisi video */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Animasi Teks Berjalan (Marquee) */
        .marquee-container {
            overflow: hidden;
            width: 100%;
            white-space: nowrap;
            position: relative;
        }
        
        .animate-marquee {
            display: inline-block;
            padding-left: 100%; /* Mulai dari luar layar sebelah kanan */
            animation: marquee 20s linear infinite; /* Kecepatan animasi 20 detik */
        }
        
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body class="flex flex-col min-h-screen bg-brand-main font-sans antialiased overflow-x-hidden">

    <!-- Top Bar -->
    <div class="bg-brand-main text-white text-[10px] sm:text-xs md:text-sm py-2 px-4 md:px-8 flex justify-between items-center w-full border-b border-brand-dark/30 z-20">
        <div class="flex items-center gap-3 md:gap-6 overflow-hidden">
            <a href="tel:+6285179637420" class="flex items-center gap-1.5 hover:text-gray-200 transition shrink-0">
                <span class="font-medium"> </span>
            </a>
        </div>
    </div>

    <!-- Main Navigation -->
    <nav class="bg-white py-2 md:py-3 px-4 md:px-8 flex justify-between items-center w-full shadow-md z-20 sticky top-0">
        <div class="flex items-center gap-3 md:gap-4">
            <div class="flex flex-col justify-center">
                <h1 class="text-brand-textDark font-extrabold text-sm sm:text-lg md:text-2xl leading-none tracking-tight uppercase">
                    Al Irsyad Al Islamiyyah Karawang
                </h1>
            </div>
        </div>

        <div class="flex items-center gap-3 md:gap-6">
            <button class="text-gray-400 hover:text-brand-main transition hidden sm:block">
                <i class="fas fa-moon text-lg md:text-xl"></i>
            </button>
            <a href="#" class="bg-brand-yellow hover:bg-yellow-500 text-[#5a4812] font-bold py-1.5 px-3 sm:py-2 sm:px-5 md:px-7 rounded-full text-[10px] sm:text-xs md:text-base transition duration-300 shadow-sm whitespace-nowrap">
                SPMB <span class="hidden xs:inline">Online</span>
            </a>
        </div>
    </nav>

    <!-- In-Page Video Player Area -->
    <main id="main-video-container" class="flex-grow relative w-full flex items-center justify-center bg-brand-main h-[400px] sm:h-[500px] md:h-[600px] lg:h-[calc(100vh-140px)] overflow-hidden">
        
        <!-- HTML5 Video Player -->
        <video id="webPlayer" class="fade-in" controlsList="nodownload" playsinline>
            <source id="videoSrc" src="" type="video/mp4">
            Browser Anda tidak mendukung tag video.
        </video>

        <!-- YouTube Player dengan izin akses lengkap -->
        <iframe id="ytPlayer" class="fade-in" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>

        <div id="videoOverlay" class="overlay-content absolute inset-0 flex flex-col items-center justify-center z-10 p-6 text-center transition-all duration-500 bg-black/20">
            <button id="startPlay" class="relative group cursor-pointer focus:outline-none" aria-label="Putar Video">
                <!-- Warna animasi ping diubah menjadi brand-yellow -->
                <div class="absolute inset-0 bg-brand-yellow rounded-full animate-ping opacity-20 group-hover:opacity-40 transition-all duration-500"></div>
                <!-- Warna latar belakang tombol diubah menjadi brand-yellow -->
                <div class="relative w-16 h-16 sm:w-20 sm:h-20 md:w-28 md:h-28 bg-brand-yellow rounded-full flex items-center justify-center shadow-2xl transition-transform duration-300 group-hover:scale-110">
                    <!-- Warna segitiga ikon cokelat gelap -->
                    <div class="w-0 h-0 border-t-[10px] sm:border-t-[14px] md:border-t-[18px] border-t-transparent border-l-[18px] sm:border-l-[22px] md:border-l-[30px] border-l-[#5a4812] border-b-[10px] sm:border-b-[14px] md:border-b-[18px] border-b-transparent ml-1 sm:ml-2"></div>
                </div>
            </button>
            <p id="videoTitle" class="text-white mt-4 sm:mt-6 font-medium text-sm sm:text-lg md:text-xl drop-shadow-md max-w-xs sm:max-w-none">
                
            </p>
        </div>

        <div id="playlistIndicator" class="absolute bottom-4 left-4 right-4 sm:left-auto sm:right-6 bg-black/60 text-white px-3 py-2 rounded-lg text-[10px] sm:text-xs md:text-sm hidden z-20 backdrop-blur-md border border-white/10 text-center sm:text-left">
            <span class="opacity-70">Sedang diputar:</span> <span id="currentTitle" class="font-bold">Video 1</span>
        </div>
    </main>

    <!-- Footer dengan Efek Teks Berjalan -->
    <footer class="bg-brand-dark py-4 w-full mt-auto z-20 border-t border-white/5 marquee-container">
        <div class="animate-marquee">
            <!-- Ukuran teks diperbesar dari text-[10px] sm:text-xs md:text-sm menjadi text-sm sm:text-base md:text-lg -->
            <p class="text-gray-300 text-sm sm:text-base md:text-lg font-medium inline-block">
                © 2026 Al Irsyad Al Islamiyyah Karawang. All rights reserved. WEC &nbsp;&nbsp; &bull; &nbsp;&nbsp; <span class="text-brand-yellow font-bold text-base sm:text-lg md:text-xl">Ayo sekolah di Al Irsyad aja!</span>
            </p>
        </div>
    </footer>

    <script>
        /**
         * DAFTAR PUTAR VIDEO (YouTube Link)
         */
        const playlist = [
            {
                title: "",
                url: "https://www.youtube.com/embed/2K5ulGO_MBs"
            },
            {
                title: "",
                url: "https://www.youtube.com/embed/YVOFYShwm8o"
            },
            {
                title: "",
                url: "https://www.youtube.com/embed/9h0Arg_-380"
            }
        ];

        let currentTrack = 0;
        const container = document.getElementById('main-video-container');
        const video = document.getElementById('webPlayer');
        const iframe = document.getElementById('ytPlayer');
        const videoSource = document.getElementById('videoSrc');
        const overlay = document.getElementById('videoOverlay');
        const startBtn = document.getElementById('startPlay');
        const indicator = document.getElementById('playlistIndicator');
        const currentTitleSpan = document.getElementById('currentTitle');

        function getYoutubeId(url) {
            if (url.includes('embed/')) return url.split('embed/')[1].split('?')[0];
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function loadVideo(index) {
            const track = playlist[index];
            const ytId = getYoutubeId(track.url);
            currentTitleSpan.innerText = track.title;

            if (ytId) {
                video.style.display = "none";
                iframe.style.display = "block";
                // Menggunakan autoplay=1, mute=1 (agar bypass block browser), dan rel=0
                iframe.src = `https://www.youtube.com/embed/${ytId}?autoplay=1&mute=1&rel=0&showinfo=0&controls=1`;
            } else {
                iframe.style.display = "none";
                video.style.display = "block";
                videoSource.src = track.url;
                video.load();
            }
        }

        startBtn.addEventListener('click', () => {
            container.classList.add('playing');
            overlay.classList.add('opacity-0', 'pointer-events-none');
            indicator.classList.remove('hidden');
            loadVideo(currentTrack);
            video.controls = true;
            if (video.style.display !== "none") video.play();
        });

        video.addEventListener('ended', () => {
            currentTrack = (currentTrack + 1) % playlist.length;
            loadVideo(currentTrack);
        });
        
        // Memuat video awal tanpa memutar otomatis sebelum klik
        const initialTrack = playlist[0];
        currentTitleSpan.innerText = initialTrack.title;
    </script>

</body>
</html>
